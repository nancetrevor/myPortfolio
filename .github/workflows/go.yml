# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build Go App & Deploy

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
    - name: Download dependencies
      run: go mod download

    - name: Build
      run: go build -o portfolioApp

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: portfolioApp
        path: portfolioApp

  deploy:
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Download binary
          uses: actions/download-artifact@v4
          with:
            name: portfolioApp
        - name: Set up SSH key
          run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

        - name: Copy binary to VPS
          run: |
            scp -i ~/.ssh/deploy_key portfolioApp ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/portfolioApp

        - name: Install binary and restart app
          run: |
            ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
              sudo mv /tmp/portfolioApp /usr/local/bin/portfolioApp
              sudo chmod +x /usr/local/bin/portfolioApp
              sudo systemctl restart portfolioApp
            EOF

