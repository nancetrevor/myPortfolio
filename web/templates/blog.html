<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}} | Trevor Nance</title>
    <meta
      name="description"
      content="Blog page for Markdown posts rendered by the Go backend."
    />
    <link rel="icon" type="image/png" href="/static/img/portfolio_favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="stylesheet" href="/static/blog/blog.css" />
  </head>
  <body>
    <div class="page-shell blog-shell" id="blog">
      <header class="intro-rail reveal blog-rail">
        <a class="brand" href="/">TN</a>

        <div class="intro-copy">
          <h1>{{.Title}}</h1>
          <p class="role">{{.Description}}</p>
        </div>

        <div class="hero-actions">
          <a class="btn btn-primary" href="/">Back Home</a>
        </div>
      </header>

      <main class="content-column blog-content">
        <section id="posts" class="section reveal">
          <div class="section-heading">
            <h2>Posts</h2>
          </div>

          {{if .BlogPosts}}
            <div class="blog-post-list">
              {{range .BlogPosts}}
                <article class="card blog-post">
                  <a class="blog-post-link" href="/blog/{{.Slug}}/">
                    <h3>{{.Title}}</h3>
                  </a>
                  <p class="blog-post-date">{{.Date}}</p>
                </article>
              {{end}}
            </div>
          {{else}}
            <article class="card blog-empty-state">
              <h3>No posts yet</h3>
            </article>
          {{end}}
        </section>
      </main>
    </div>
    <script src="/static/js/script.js"></script>
  </body>
</html>
